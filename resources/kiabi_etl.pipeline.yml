# Spark Declarative Pipeline: Kiabi listings (bronze → silver → gold) + manual scraping.
# Reads from the landing volume (scraper job + manual uploads).
# Manual scraping: upload from local output/manual_scraping/ to the landing volume:
#   - ebay + vestiaire CSVs → manual_scraping/listings/
#   - essentials_bebe.csv → manual_scraping/essentials_bebe/
#   - essentials_femme.csv (any *.csv) → manual_scraping/essentials_femme/
# Use scripts/upload_manual_scraping.py to sync. Then run pipeline; gold_kiabi_listings and
# gold_essentials include manual data. Run "Kiabi - download listing images" after pipeline for all sources.
resources:
  pipelines:
    kiabi_etl:
      name: "[${bundle.target}] Kiabi listings ETL"
      catalog: ${var.catalog}
      target: ${var.schema}
      libraries:
        # Folder path must end with /** to include all files (doc: pipeline.libraries.glob)
        - glob:
            include: ../src/kiabi_etl/transformations/**
      root_path: ../src/kiabi_etl
      serverless: true
      configuration:
        landing_path: /Volumes/${var.catalog}/${var.schema}/${var.landing_volume}
        schema_location_base: /Volumes/${var.catalog}/${var.schema}/kiabi_etl_metadata/schemas
      continuous: false
      development: true
      photon: true
      channel: current
      permissions:
        - level: CAN_VIEW
          group_name: users
        - level: CAN_RUN
          group_name: users
