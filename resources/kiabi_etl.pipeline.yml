# Spark Declarative Pipeline: Kiabi listings (bronze → silver → gold)
# Reads from the landing volume populated by kiabi_scraper_job.
# To reload ALL landing files (e.g. after re-upload): in the pipeline UI run an update with
# "Reset streaming flow checkpoints" for the bronze flow, then run the pipeline again.
resources:
  pipelines:
    kiabi_etl:
      name: "[${bundle.target}] Kiabi listings ETL"
      catalog: ${var.catalog}
      target: ${var.schema}
      libraries:
        - glob:
            include: ../src/kiabi_etl/transformations/**
      root_path: ../src/kiabi_etl
      serverless: true
      configuration:
        landing_path: /Volumes/${var.catalog}/${var.schema}/${var.landing_volume}
        schema_location_base: /Volumes/${var.catalog}/${var.schema}/kiabi_etl_metadata/schemas
      continuous: false
      development: true
      photon: true
      channel: current
      permissions:
        - level: CAN_VIEW
          group_name: users
        - level: CAN_RUN
          group_name: users
